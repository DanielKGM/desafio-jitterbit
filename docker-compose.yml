version: "3.8"

services:
  api:
    build: .
    container_name: order-api

    ports:
      - "${PORT}:3000"

    depends_on:
      - mongo

    env_file:
      - .env

    volumes:
      - .:/app
      - /app/node_modules

  mongo:
    image: mongo:7
    container_name: order-mongo

    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
